<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <rect width="120" height="120" rx="18" fill="#0a0a0a"/>

  <!-- outer glow ring -->
  <circle cx="60" cy="52" r="38" fill="none" stroke="#b8860b" stroke-width="1" opacity="0.3"/>

  <!-- bag body left -->
  <rect x="14" y="42" width="22" height="22" rx="3" fill="#b8860b"/>
  <rect x="18" y="38" width="6" height="6" rx="2" fill="none" stroke="#b8860b" stroke-width="2"/>
  <rect x="22" y="38" width="6" height="6" rx="2" fill="none" stroke="#b8860b" stroke-width="2"/>

  <!-- bag body right -->
  <rect x="84" y="42" width="22" height="22" rx="3" fill="#b8860b"/>
  <rect x="88" y="38" width="6" height="6" rx="2" fill="none" stroke="#b8860b" stroke-width="2"/>
  <rect x="92" y="38" width="6" height="6" rx="2" fill="none" stroke="#b8860b" stroke-width="2"/>

  <!-- A letter -->
  <text x="60" y="66" font-family="Georgia, serif" font-size="38" font-weight="900"
    fill="#b8860b" text-anchor="middle" dominant-baseline="auto">A</text>

  <!-- X cross lines over A -->
  <line x1="42" y1="38" x2="78" y2="70" stroke="#b8860b" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="78" y1="38" x2="42" y2="70" stroke="#b8860b" stroke-width="3.5" stroke-linecap="round" opacity="0.9"/>

  <!-- divider line -->
  <line x1="28" y1="82" x2="92" y2="82" stroke="#b8860b" stroke-width="0.8" opacity="0.6"/>

  <!-- AnandX text -->
  <text x="60" y="94" font-family="Georgia, serif" font-size="13" font-weight="700"
    fill="#b8860b" text-anchor="middle" letter-spacing="1">AnandX</text>

  <!-- BAGS text -->
  <text x="60" y="108" font-family="Arial, sans-serif" font-size="9" font-weight="700"
    fill="#e8c98a" text-anchor="middle" letter-spacing="4">BAGS</text>
</svg>
